site_name: Fraggle Docs
site_description: A Kotlin-based AI assistant framework with messaging platform integration.
site_url: https://drewcarlson.github.io/Fraggle/
repo_url: https://github.com/drewcarlson/Fraggle
remote_branch: gh-pages
docs_dir: docs
edit_uri: edit/main/docs/
copyright: 'Copyright &copy; 2026 Fraggle Maintainers'

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.action.edit
    - content.code.copy
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mike
  - markdownextradata: {}

extra:
  fraggle_version: !ENV [VERSION, '0.0.1-dev']
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DrewCarlson/Fraggle

nav:
  - Home: index.md
  - Installation:
      - Getting Started: installation/getting-started.md
      - Configuration: installation/configuration.md
      - Signal Setup: installation/signal-setup.md
      - Discord Setup: installation/discord-setup.md
  - Architecture:
      - Overview: architecture/overview.md
      - Agent System: architecture/agent.md
      - Tools: architecture/tools.md
      - Memory: architecture/memory.md
  - Development:
      - Building: development/building.md
      - Testing: development/testing.md
      - Contributing: development/contributing.md
