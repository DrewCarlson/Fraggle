# Fraggle Configuration
# See documentation for all available options

fraggle:
  database:
    path: "./config/fraggle.db"  # SQLite file path

  # Tracing settings
  tracing:
    level: off                        # off, metadata, full

  # LLM Provider settings
  provider:
    type: lmstudio                    # lmstudio, openai, anthropic
    url: http://localhost:1234/v1     # API endpoint
    model: ""                         # Model name (optional for LM Studio)
    # api_key: ""                     # Required for OpenAI/Anthropic

  # API serving settings
  api:
    enabled: true
    host: "0.0.0.0"
    port: 9191

  # Web dashboard serving settings
  dashboard:
    enabled: true
    static_path: null  # or path to built dashboard files

  # Chat bridge settings
  bridges:
    # Signal messenger integration
    signal:
      enabled: true
      phone: ""                       # Your Signal phone number (e.g., "+1234567890")
      config_dir: ./config/apps/signal
      trigger: "@fraggle"             # Prefix to trigger the bot in groups (null for all messages)
      # signal_cli_path: /usr/local/bin/signal-cli  # Optional: path to signal-cli
      respond_to_direct_messages: true
      show_typing_indicator: true

    # Future bridges:
    # discord:
    #   enabled: false
    #   token: ""
    # telegram:
    #   enabled: false
    #   bot_token: ""

  # Prompt files configuration
  # Prompt files (SYSTEM.md, IDENTITY.md, USER.md) are created from templates on first run.
  # Edit these files to customize the assistant's personality and behavior.
  prompts:
    prompts_dir: ./config/prompts     # Directory for prompt files
    max_file_chars: 20000             # Max chars per file before truncation
    auto_create_missing: true         # Create missing files from templates

  # Memory storage settings
  memory:
    base_dir: ./data/memory

  # Executor settings
  executor:
    type: local                       # local, remote
    work_dir: ./data/workspace
    remote_url: ""                    # URL of remote worker (only used when type is remote)
    supervision: none                 # none, supervised
    tool_policies: []                 # policy-based rules for tool approval (allow, deny, ask)

  # Agent settings
  agent:
    temperature: 0.7
    max_tokens: 4096
    max_iterations: 10
    max_history_messages: 20

  # Registered chats (optional - if empty, responds to all)
  chats:
    registered: [ ]
    # - id: "group-abc123"
    #   name: "Dev Team"
    #   trigger_override: "@bot"
    #   enabled: true

  # Web fetching settings
  web:
  # Playwright settings for JavaScript-heavy pages (optional)
  # playwright:
  #   ws_endpoint: ws://localhost:3000
  #   navigation_timeout: 30000
  #   wait_after_load: 2000
  #   viewport_width: 1280
  #   viewport_height: 720
